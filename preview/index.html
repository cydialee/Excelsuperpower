<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excel 鏅鸿兘鎵撳嵃宸ヤ綔鍙?/title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --ink: #102033;
      --muted: #6b7b8f;
      --line: #dce5ef;
      --line-soft: #edf2f7;
      --blue: #246bfe;
      --blue-soft: #eff5ff;
      --mint: #19c6a7;
      --mint-soft: #e9fbf7;
      --orange: #ff9f43;
      --orange-soft: #fff4e8;
      --red: #ff5c72;
      --shadow: 0 18px 45px rgba(31, 52, 89, 0.1);
      --shadow-soft: 0 8px 24px rgba(31, 52, 89, 0.08);
      --rail: 86px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 8%, #eaf5ff 0, transparent 30%),
        radial-gradient(circle at 84% 12%, #e8fff9 0, transparent 28%),
        var(--bg);
    }

    button, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--rail) minmax(0, 1fr);
    }

    .rail {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 14px 10px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      box-shadow: 8px 0 32px rgba(37, 58, 91, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 20;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      background: linear-gradient(145deg, #1cc9aa, #246bfe);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 14px 28px rgba(36, 107, 254, 0.25);
      font-weight: 800;
      font-size: 13px;
      text-align: center;
      line-height: 1.15;
    }

    .rail-tools {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .rail-btn {
      position: relative;
      width: 100%;
      min-height: 56px;
      border: 0;
      background: transparent;
      border-radius: 18px;
      color: #5e7188;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .25s ease, background .25s ease, color .25s ease;
    }

    .rail-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .rail-btn .label {
      position: absolute;
      left: 68px;
      top: 50%;
      transform: translateY(-50%) translateX(-8px);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      background: #12233a;
      color: #fff;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      box-shadow: var(--shadow-soft);
      transition: .2s ease;
    }

    .rail-btn:hover .label {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    .rail-btn.active {
      background: linear-gradient(145deg, #eff8ff, #e9fbf7);
      color: var(--blue);
      transform: translateX(10px);
      box-shadow: 0 16px 28px rgba(36, 107, 254, 0.16);
    }

    .rail-btn.active::before {
      content: "";
      position: absolute;
      left: -9px;
      width: 5px;
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(var(--mint), var(--blue));
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: 72px 60px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 22px;
      border-bottom: 1px solid rgba(220, 229, 239, .75);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px);
    }

    .title-block {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .title-block h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .2px;
    }

    .title-block p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 720px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--mint-soft);
      color: #087b67;
      font-size: 12px;
      font-weight: 800;
    }

    .status-pill.warn {
      background: var(--orange-soft);
      color: #a45b00;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 5px rgba(25, 198, 167, .14);
    }

    .status-pill.warn .status-dot {
      background: var(--orange);
      box-shadow: 0 0 0 5px rgba(255, 159, 67, .14);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      width: 250px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 0 14px;
      color: var(--muted);
      outline: none;
    }

    .btn {
      min-height: 38px;
      border: 0;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .2s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--blue), #5b8cff);
      color: #fff;
      box-shadow: 0 10px 22px rgba(36, 107, 254, .2);
    }

    .btn.ghost {
      background: #fff;
      border: 1px solid var(--line);
      color: #40536b;
    }

    .btn.warn {
      background: linear-gradient(135deg, #ffb25f, #ff8d4b);
      color: #fff;
    }

    .module-tabs {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 22px;
      border-bottom: 1px solid rgba(220, 229, 239, .75);
      background: rgba(248, 251, 255, .72);
      overflow-x: auto;
    }

    .step-tab {
      height: 38px;
      border: 1px solid var(--line);
      background: #fff;
      color: #4f6178;
      border-radius: 14px;
      padding: 0 14px;
      font-weight: 800;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .step-tab .num {
      width: 20px;
      height: 20px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f1f5f9;
      color: #71839a;
      font-size: 11px;
    }

    .step-tab.active {
      background: linear-gradient(135deg, #f0f7ff, #eafff9);
      border-color: #bfeee5;
      color: #0e665a;
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(25, 198, 167, .13);
    }

    .step-tab.active .num {
      background: linear-gradient(135deg, var(--mint), var(--blue));
      color: #fff;
    }

    .workspace {
      min-height: 0;
      padding: 16px;
      overflow: auto;
    }

    .stage {
      display: none;
      height: 100%;
      animation: fadeIn .3s ease;
    }

    .stage.active {
      display: block;
    }

    .stage-grid > .card,
    .stage-grid.wide > .card {
      opacity: 0;
      transform: translateY(20px) scale(.986);
    }

    .stage.active .card {
      opacity: 1;
      transform: none;
      animation: stageCardIn .62s cubic-bezier(.22, 1, .36, 1) both;
    }

    .stage.active .card:nth-child(2) {
      animation-delay: .08s;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: minmax(420px, 47%) minmax(540px, 53%);
      gap: 16px;
      min-height: calc(100vh - 180px);
    }

    .stage-grid.wide {
      grid-template-columns: minmax(520px, 42%) minmax(640px, 58%);
    }

    .card {
      min-width: 0;
      background: var(--panel);
      border: 1px solid rgba(220, 229, 239, .9);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-head {
      min-height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, .72);
    }

    .card-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .card-head .mini {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .card-body {
      padding: 16px;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .upload-box {
      position: relative;
      min-height: 250px;
      border: 2px dashed #b8d7ee;
      border-radius: 26px;
      background: linear-gradient(145deg, #f8fcff, #f1fff8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      overflow: hidden;
    }

    .upload-box::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 0deg, transparent, #e8fff9, transparent, #eef5ff, transparent);
      opacity: .75;
      animation: spin 9s linear infinite;
    }

    .upload-box > * {
      position: relative;
      z-index: 1;
    }

    .upload-box input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      width: 74px;
      height: 74px;
      border-radius: 24px;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-soft);
    }

    .upload-icon svg {
      width: 34px;
      height: 34px;
      stroke: var(--blue);
      fill: none;
      stroke-width: 1.8;
    }

    .upload-box h3 {
      margin: 0;
      font-size: 21px;
    }

    .upload-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .status-text {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .status-text.ok {
      color: #087b67;
    }

    .status-text.error {
      color: #bd2d42;
    }

    .status-text.warn {
      color: #a45b00;
    }

    .meta-grid,
    .insight-grid,
    .export-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .hero-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(145deg, #f6fbff, #f0fff9);
      padding: 14px;
    }

    .hero-panel h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .hero-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .quick-print-panel {
      margin-top: 14px;
      border: 1px solid rgba(25, 198, 167, .24);
      border-radius: 22px;
      padding: 16px;
      background:
        radial-gradient(circle at top right, rgba(36, 107, 254, .14), transparent 32%),
        linear-gradient(145deg, #effcf9, #f4f9ff 58%, #ffffff);
      box-shadow: 0 18px 34px rgba(25, 198, 167, .08);
      position: relative;
      overflow: hidden;
    }

    .quick-print-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 10%, rgba(255,255,255,.45) 32%, transparent 54%);
      transform: translateX(-48%);
      animation: quickPrintBeam 3.4s linear infinite;
      pointer-events: none;
    }

    .quick-print-panel h3,
    .quick-print-panel p,
    .quick-print-panel .hero-inline,
    .quick-print-panel .action-row {
      position: relative;
      z-index: 1;
    }

    .hero-inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .input-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .input-line input {
      min-width: 180px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .selector-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .selector-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
      min-width: 220px;
    }

    .sheet-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 12px;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
      color: #40536b;
      box-shadow: 0 6px 18px rgba(31, 52, 89, .05);
    }

    .sheet-pill strong {
      color: var(--ink);
    }

    .sheet-pill.active {
      border-color: rgba(25, 198, 167, .34);
      background: linear-gradient(135deg, #effcf9, #f4f9ff);
      color: #0a7764;
    }

    .inline-select {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 8px 0 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 10px 26px rgba(31, 52, 89, .06);
    }

    .inline-select span {
      font-size: 12px;
      font-weight: 800;
      color: #52657d;
      white-space: nowrap;
    }

    .inline-select select {
      min-width: 200px;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-weight: 900;
      outline: none;
    }

    .preview-rail {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .preview-rail button {
      min-width: 150px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      background: #fff;
      text-align: left;
    }

    .preview-rail button.active {
      border-color: var(--mint);
      background: var(--mint-soft);
      box-shadow: 0 8px 18px rgba(25, 198, 167, .12);
    }

    .parse-progress {
      margin: 14px 0 16px;
      border: 1px solid rgba(16, 32, 51, .08);
      border-radius: 22px;
      padding: 16px 18px;
      background:
        radial-gradient(circle at top right, rgba(36, 107, 254, .12), transparent 38%),
        linear-gradient(145deg, #0f1d31, #18304e 58%, #1e4f7d);
      color: #f6fbff;
      box-shadow: 0 18px 40px rgba(15, 29, 49, .18);
    }

    .parse-progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .parse-progress-head strong {
      display: block;
      font-size: 16px;
    }

    .parse-progress-head span {
      display: block;
      margin-top: 4px;
      color: rgba(236, 246, 255, .78);
      font-size: 12px;
      line-height: 1.6;
    }

    .parse-progress-value {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.04em;
      color: #fff5dd;
    }

    .parse-track {
      position: relative;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, .14);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, .18);
    }

    .parse-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #5af1d6, #6fb5ff 52%, #ffd166);
      box-shadow: 0 0 18px rgba(111, 181, 255, .38);
      transition: width .35s ease;
    }

    .parse-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 15%, rgba(255,255,255,.55) 35%, transparent 55%);
      transform: translateX(-42%);
      animation: parseBeam 2.2s linear infinite;
    }

    .parse-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .parse-step {
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 16px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, .08);
    }

    .parse-step b,
    .parse-step span {
      display: block;
    }

    .parse-step b {
      margin-bottom: 4px;
      font-size: 12px;
    }

    .parse-step span {
      color: rgba(240, 247, 255, .76);
      font-size: 11px;
      line-height: 1.5;
    }

    .parse-step.active {
      background: rgba(255, 255, 255, .18);
      border-color: rgba(111, 181, 255, .42);
    }

    .parse-step.done {
      background: rgba(90, 241, 214, .16);
      border-color: rgba(90, 241, 214, .4);
    }

    .parse-step.warn {
      background: rgba(255, 181, 95, .18);
      border-color: rgba(255, 159, 67, .42);
    }

    .page-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, #fff, #f8fbff);
    }

    .page-chip {
      min-width: 152px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      text-align: left;
      box-shadow: 0 12px 24px rgba(31, 52, 89, .06);
      transition: transform .24s ease, box-shadow .24s ease, border-color .24s ease;
      position: relative;
      overflow: hidden;
    }

    .page-chip::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, rgba(25, 198, 167, .82), rgba(36, 107, 254, .92));
      opacity: .22;
    }

    .page-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(31, 52, 89, .1);
    }

    .page-chip b,
    .page-chip span {
      display: block;
    }

    .page-chip b {
      font-size: 12px;
      margin-bottom: 4px;
    }

    .page-chip span {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .page-chip.active {
      border-color: var(--blue);
      background: #edf5ff;
      box-shadow: 0 10px 24px rgba(36, 107, 254, .14);
    }

    .page-strip.compact {
      padding: 10px 0 14px;
      border-bottom: 0;
      background: transparent;
    }

    .page-strip.compact .page-chip {
      min-width: 132px;
    }

    @keyframes parseBeam {
      from { transform: translateX(-42%); }
      to { transform: translateX(120%); }
    }

    @keyframes quickPrintBeam {
      from { transform: translateX(-48%); }
      to { transform: translateX(122%); }
    }

    .meta-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .export-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .meta-card,
    .export-card,
    .insight-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px;
    }

    .meta-card strong,
    .insight-card strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .meta-card span,
    .insight-card span,
    .muted {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .sheet-strip,
    .range-sheet-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sheet-chip,
    .range-sheet-chip {
      min-width: 146px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      background: #fff;
      text-align: left;
    }

    .sheet-chip.active,
    .range-sheet-chip.active {
      border-color: var(--mint);
      background: var(--mint-soft);
      box-shadow: 0 8px 18px rgba(25, 198, 167, .12);
    }

    .sheet-chip b,
    .range-sheet-chip b {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .sheet-chip span,
    .range-sheet-chip span {
      font-size: 12px;
      color: var(--muted);
      display: block;
      line-height: 1.6;
    }

    .sheet-list,
    .config-list,
    .issue-list,
    .download-list {
      display: grid;
      gap: 10px;
    }

    .sheet-row,

      min-height: 38px;
      padding: 0 14px;

      font-weight: 900;

      text-align: center;
      color: var(--muted);

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: #102033;
      color: #fff;
      border-radius: 16px;
      padding: 13px 16px;

      z-index: 99;

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes stageCardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(.986);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes paperFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @media (max-width: 1360px) {

      .stage-grid.wide {

    @media (prefers-reduced-motion: reduce) {

    }

</head>

  <script>
    const $ = (id) => document.getElementById(id);

    const FIT_MODE_LABELS = {
      singlePage: "整表一页",
      fitRows: "所有行压一页",
      fitColumns: "所有列压一页"
    };

    const ORIENTATION_LABELS = {
      portrait: "绾靛悜",
      landscape: "妯悜"
    };

    const DEFAULT_PRINT_SETTINGS = {
      id: "fit-columns",
      orientation: "landscape",
      fitMode: "fitColumns",
      fitToWidth: 1,
      fitToHeight: 0,
      repeatHeader: true,
      freezeTopRow: true,
      margin: "normal",
      beautify: true,
      showGridLines: false,
      wrapLongText: false,
      wrapTextColumns: "",
      horizontalCenter: false,
      verticalCenter: false
    };

    const state = {
      stage: "upload",
      workbookId: "",
      workbookName: "",
      sheets: [],
      plans: [],
      activePlanId: "",
      preview: null,
      downloads: [],
      exportWarnings: [],
      sheetSettingsByName: {},
      dragging: false,
      dragOrigin: null,
      uploadStage: "idle",
      pendingWorkbookName: "",
      previewUi: {
        settingsSheetName: "",
        settingsPageBySheet: {},
        areaPageBySheet: {},
        uploadPageBySheet: {},
        detailPageBySheet: {}
      },
      settings: { ...DEFAULT_PRINT_SETTINGS },
      batch: {
        baseSheetName: "",
        lastAppliedCount: 0
      }
    };

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function apiUrl(path) {
      if (/^https?:/i.test(path)) return path;
      return new URL(path, window.location.origin).toString();
    }

    function downloadFileName(url) {
      const clean = String(url || "").split("?")[0].split("#")[0];
      const raw = clean.slice(clean.lastIndexOf("/") + 1) || "download";
      try {
        return decodeURIComponent(raw);
      } catch {
        return raw;
      }
    }

    function cloneSettings(settings = DEFAULT_PRINT_SETTINGS) {
      return {
        ...DEFAULT_PRINT_SETTINGS,
        ...(settings || {})
      };
    }

    function settingsSheetName() {
      return state.previewUi.settingsSheetName || state.activeSheetName || state.sheets[0]?.name || "";
    }

    function ensureSheetSettings(sheetName, fallback = null) {
      if (!sheetName) return cloneSettings(fallback || state.settings);
      if (!state.sheetSettingsByName[sheetName]) {
        state.sheetSettingsByName[sheetName] = cloneSettings(fallback || state.settings);
      }
      return state.sheetSettingsByName[sheetName];
    }

    function sheetSettings(sheetOrName, fallback = null) {
      const sheetName = typeof sheetOrName === "string" ? sheetOrName : sheetOrName?.name;
      return ensureSheetSettings(sheetName, fallback);
    }

    function syncUiSettingsFromSheet(sheetName = settingsSheetName()) {
      state.settings = cloneSettings(ensureSheetSettings(sheetName));
      state.activePlanId = state.settings.id || state.activePlanId || DEFAULT_PRINT_SETTINGS.id;
      return state.settings;
    }

    function commitUiSettingsToSheet(sheetName = settingsSheetName()) {
      if (!sheetName) return;
      state.sheetSettingsByName[sheetName] = cloneSettings(state.settings);

    function syncPaperLayouts() {
      document.querySelectorAll("[data-paper-shell]").forEach((shell) => {
        const scope = shell.dataset.paperShell || "";
        const wrap = shell.closest("[data-paper-wrap]");
        const paper = shell.querySelector("[data-paper-scope]");
        if (!wrap || !paper) return;

        const portrait = previewOrientation(scope) === "portrait";
        const baseWidth = portrait ? 820 : 1120;
        const baseMinHeight = portrait ? 1160 : 790;

        paper.classList.toggle("portrait", portrait);
        paper.style.width = `${baseWidth}px`;
        paper.style.minHeight = `${baseMinHeight}px`;
        paper.style.transform = "translateX(-50%) scale(1)";

        const availableWidth = Math.max(280, wrap.clientWidth - 40);
        const availableHeight = Math.max(320, wrap.clientHeight - (scope === "settings" ? 160 : 32));
        const naturalHeight = Math.max(baseMinHeight, paper.scrollHeight);
        const scale = Math.min(1, availableWidth / baseWidth, availableHeight / naturalHeight);

        shell.style.width = `${Math.max(260, Math.round(baseWidth * scale))}px`;
        shell.style.height = `${Math.max(280, Math.round(naturalHeight * scale))}px`;
        paper.style.transform = `translateX(-50%) scale(${scale})`;
      });
    }

    function colToIndex(label) {
      return label.toUpperCase().split("").reduce((sum, char) => sum * 26 + (char.charCodeAt(0) - 64), 0);
    }

    function indexToCol(number) {
      let current = number;
      let text = "";
      while (current > 0) {
        const remain = (current - 1) % 26;
        text = String.fromCharCode(65 + remain) + text;
        current = Math.floor((current - 1) / 26);
      }
      return text;
    }

    function parseRange(value) {
      const match = /^([A-Za-z]{1,3})(\d+)(?::([A-Za-z]{1,3})(\d+))?$/.exec((value || "").replace(/\$/g, "").trim());
      if (!match) return null;
      const col1 = colToIndex(match[1]);
      const row1 = Number(match[2]);
      const col2 = colToIndex(match[3] || match[1]);
      const row2 = Number(match[4] || match[2]);
      return {
        minRow: Math.min(row1, row2),
        minCol: Math.min(col1, col2),
        maxRow: Math.max(row1, row2),
        maxCol: Math.max(col1, col2)
      };
    }

    function formatRange(bounds) {
      if (!bounds) return "";
      return `${indexToCol(bounds.minCol)}${bounds.minRow}:${indexToCol(bounds.maxCol)}${bounds.maxRow}`;
    }

    function intersects(a, b) {
      return !(a.maxRow < b.minRow || b.maxRow < a.minRow || a.maxCol < b.minCol || b.maxCol < a.minCol);
    }

    function contains(outer, inner) {
      return outer.minRow <= inner.minRow &&
        outer.minCol <= inner.minCol &&
        outer.maxRow >= inner.maxRow &&
        outer.maxCol >= inner.maxCol;
    }

    function unionBounds(a, b) {
      return {
        minRow: Math.min(a.minRow, b.minRow),
        minCol: Math.min(a.minCol, b.minCol),
        maxRow: Math.max(a.maxRow, b.maxRow),
        maxCol: Math.max(a.maxCol, b.maxCol)
      };
    }

    function expandSelectionForMerges(bounds, regions) {
      let current = { ...bounds };
      let changed = true;
      while (changed) {
        changed = false;
        for (const region of regions || []) {
          const area = {
            minRow: region.startRow,
            minCol: region.startCol,
            maxRow: region.endRow,
            maxCol: region.endCol
          };
          if (intersects(current, area) && !contains(current, area)) {
            current = unionBounds(current, area);
            changed = true;
          }
        }
      }
      return current;
    }

    function normalizeToken(value) {
      return String(value || "").trim().toLowerCase();
    }

    function headerFingerprint(sheet) {
      const preview = sheet?.preview || [];
      if (!preview.length) return [];
      const candidates = preview
        .slice(0, 4)
        .map((row) => row.map(normalizeToken).filter(Boolean))
        .filter((row) => row.length);
      if (!candidates.length) return [];
      candidates.sort((a, b) => b.length - a.length);
      return candidates[0];
    }

    function similarityScore(baseSheet, targetSheet) {
      if (!baseSheet || !targetSheet || baseSheet.name === targetSheet.name) return 0;
      const baseHeader = headerFingerprint(baseSheet);
      const targetHeader = headerFingerprint(targetSheet);
      const headerMatchCount = baseHeader.filter((item, index) => item && item === targetHeader[index]).length;
      const headerScore = Math.min(1, headerMatchCount / Math.max(1, Math.max(baseHeader.length, targetHeader.length)));
      const columnScore = 1 - Math.min(1, Math.abs((baseSheet.columns || 0) - (targetSheet.columns || 0)) / Math.max(1, baseSheet.columns || 1));
      const rowScore = 1 - Math.min(1, Math.abs((baseSheet.rows || 0) - (targetSheet.rows || 0)) / Math.max(12, baseSheet.rows || 1));
      const orientationBonus = baseSheet.recommendedOrientation === targetSheet.recommendedOrientation ? 0.12 : 0;
      return headerScore * 0.5 + columnScore * 0.28 + rowScore * 0.1 + orientationBonus;
    }

    function matchedSheetsFor(baseSheet, threshold = 0.72) {
      return state.sheets
        .map((sheet) => ({ sheet, score: similarityScore(baseSheet, sheet) }))
        .filter((item) => item.score >= threshold)
        .sort((a, b) => b.score - a.score);
    }

    function batchBaseSheet() {
      return state.sheets.find((sheet) => sheet.name === state.batch.baseSheetName) || activeSheet();

    function batchSummary() {
      const base = batchBaseSheet();
      if (!base) return { base: null, matches: [], selectedMatches: [] };
      const matches = matchedSheetsFor(base);
      const selectedMatches = matches.filter(({ sheet }) => sheet.checked);
      return { base, matches, selectedMatches };
    }

    function initialCheckedNames(sheets) {
      const base = sheets[0];
      if (!base) return new Set();
      const picks = new Set([base.name]);
      for (const { sheet } of sheets
        .map((sheet) => ({ sheet, score: similarityScore(base, sheet) }))
        .filter((item) => item.score >= 0.72)
        .sort((a, b) => b.score - a.score)
        .slice(0, 4)) {
        picks.add(sheet.name);
      }
      if (picks.size === 1 && sheets[1]) picks.add(sheets[1].name);
      return picks;
    }

    function cloneRangeToSheet(baseSheet, targetSheet) {
      const baseRange = parseRange(baseSheet.printRange);
      const baseAuto = parseRange(baseSheet.autoRange);
      const targetAuto = parseRange(targetSheet.autoRange);
      if (!baseRange || !baseAuto || !targetAuto) return false;
      const offsetTop = baseRange.minRow - baseAuto.minRow;
      const offsetLeft = baseRange.minCol - baseAuto.minCol;
      const height = baseRange.maxRow - baseRange.minRow;
      const width = baseRange.maxCol - baseRange.minCol;
      let next = {
        minRow: targetAuto.minRow + offsetTop,
        minCol: targetAuto.minCol + offsetLeft,
        maxRow: targetAuto.minRow + offsetTop + height,
        maxCol: targetAuto.minCol + offsetLeft + width
      };
      next = {
        minRow: Math.max(targetAuto.minRow, next.minRow),
        minCol: Math.max(targetAuto.minCol, next.minCol),
        maxRow: Math.min(targetAuto.maxRow, next.maxRow),
        maxCol: Math.min(targetAuto.maxCol, next.maxCol)
      };
      if (next.maxRow < next.minRow || next.maxCol < next.minCol) return false;
      targetSheet.printRange = formatRange(next);
      targetSheet.rangeSource = "batch";
      targetSheet.checked = true;
      return true;
    }

    function autoSelectMatchingSheets() {
      const base = batchBaseSheet();
      if (!base) return 0;
      base.checked = true;
      const matches = matchedSheetsFor(base);
      matches.forEach(({ sheet }) => { sheet.checked = true; });
      state.batch.baseSheetName = base.name;
      state.batch.lastAppliedCount = matches.length;
      if (!state.activeSheetName) state.activeSheetName = base.name;
      return matches.length;
    }

    function applyCurrentRangeToMatches() {
      const base = batchBaseSheet();
      if (!base) return 0;
      let count = 0;
      for (const { sheet } of matchedSheetsFor(base)) {
        if (cloneRangeToSheet(base, sheet)) count += 1;
      }
      state.batch.baseSheetName = base.name;
      state.batch.lastAppliedCount = count;
      return count;
    }

    function sheetCellLookup(sheet) {
      const map = new Map();
      for (const row of sheet?.grid?.cells || []) {
        for (const cell of row) {
          map.set(`${cell.row}:${cell.col}`, cell);
        }
      }
      return map;
    }

    function rangeRowsFromGrid(sheet, bounds, maxRows = 14) {
      if (!sheet || !sheet.grid) return [];
      const map = sheetCellLookup(sheet);
      const rows = [];
      const endRow = Math.min(bounds.maxRow, bounds.minRow + maxRows - 1, sheet.grid.endRow);
      for (let row = bounds.minRow; row <= endRow; row += 1) {
        const current = [];
        for (let col = bounds.minCol; col <= Math.min(bounds.maxCol, sheet.grid.endCol); col += 1) {
          const cell = map.get(`${row}:${col}`);
          if (!cell || cell.hiddenByMerge) continue;
          current.push(cell);
        }
        rows.push(current);
      }
      return rows;
    }

    function renderRangeGrid() {
      const sheet = activeSheet();
      const table = $("rangeGrid");
      if (!sheet) {
        table.innerHTML = `<tbody><tr><td class="muted">杩樻病鏈夊彲浠ョ紪杈戠殑琛ㄦ牸棰勮銆?/td></tr></tbody>`;

      if (!sheet.grid) {
        table.innerHTML = `<tbody><tr><td class="muted">杩涘叆鎵撳嵃鍖哄煙鍚庝細鎸夐渶鍔犺浇杩欎釜 Sheet 鐨勮〃鏍肩綉鏍笺€?/td></tr></tbody>`;
        return;
      }

      const columns = [];
      for (let col = sheet.grid.startCol; col <= sheet.grid.endCol; col += 1) columns.push(col);
      let html = `<thead><tr><th class="corner row-head"></th>${columns.map((col) => `<th>${indexToCol(col)}</th>`).join("")}</tr></thead><tbody>`;
      for (const row of sheet.grid.cells) {
        html += `<tr><th class="row-head">${row[0]?.row || ""}</th>`;
        for (const cell of row) {
          if (cell.hiddenByMerge) continue;
          html += `<td
            data-kind="cell"
            data-row="${cell.row}"
            data-col="${cell.col}"
            data-end-row="${cell.row + (cell.rowSpan || 1) - 1}"
            data-end-col="${cell.col + (cell.colSpan || 1) - 1}"
            rowspan="${cell.rowSpan || 1}"
            colspan="${cell.colSpan || 1}"
            class="${cell.missingCachedValue ? "warn" : ""}"
          >${esc(cell.display)}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody>`;
      table.innerHTML = html;

      table.querySelectorAll('td[data-kind="cell"]').forEach((cell) => {
        cell.addEventListener("mousedown", (event) => {
          event.preventDefault();
          state.dragging = true;
          state.dragOrigin = cellDatasetBounds(cell);
          updateSelectionFromBounds(state.dragOrigin, false);
        });
        cell.addEventListener("mouseenter", () => {
          if (!state.dragging || !state.dragOrigin) return;
          const current = cellDatasetBounds(cell);
          const merged = expandSelectionForMerges(unionBounds(state.dragOrigin, current), sheet.grid.mergedRegions);
          updateSelectionFromBounds(merged, false);
        });
      });
      paintSelection();
    }

    function cellDatasetBounds(cell) {
      return {
        minRow: Number(cell.dataset.row),
        minCol: Number(cell.dataset.col),
        maxRow: Number(cell.dataset.endRow),
        maxCol: Number(cell.dataset.endCol)
      };

    function updateSelectionFromBounds(bounds, syncRange = true) {
      const sheet = activeSheet();
      if (!sheet) return;
      const expanded = expandSelectionForMerges(bounds, sheet.grid?.mergedRegions || []);
      sheet.printRange = formatRange(expanded);
      sheet.rangeSource = "manual";
      $("activeRangeLabel").textContent = sheet.printRange;
      $("manualRangeInput").value = sheet.printRange;
      paintSelection();
      renderAreaPreview();
      if (syncRange) {
        refreshPreview().catch((error) => setDownloadStatus(explainNetworkError(error), "error"));
      }
    }

    function paintSelection() {
      const sheet = activeSheet();
      const current = parseRange(sheet?.printRange);
      document.querySelectorAll('#rangeGrid td[data-kind="cell"]').forEach((cell) => {
        const bounds = cellDatasetBounds(cell);
        const selected = current && intersects(current, bounds);
        cell.classList.toggle("selected", Boolean(selected));
        cell.classList.toggle("anchor", Boolean(current && bounds.minRow === current.minRow && bounds.minCol === current.minCol));
      });
    }

    function renderAll() {
      const steps = [
        ["top-summary", updateTopSummary],
        ["upload-stage", renderUploadSection],
        ["sheet-stage", renderSheetsStage],
        ["range-strip", renderRangeSheetStrip],
        ["range-grid", renderRangeGrid],
        ["area-preview", renderAreaPreview],
        ["settings-stage", renderSettingsStage],
        ["ai-stage", renderAiStage],
        ["export-stage", renderExportStage]
      ];
      const issues = [];
      for (const [scope, renderStep] of steps) {
        try {
          renderStep();
        } catch (error) {
          issues.push(reportClientIssue(scope, error));
        }
      }
      if (issues.length) {
        setTopStatus(`界面局部渲染异常（${issues.length} 处），核心流程继续执行`, true);
        if (state.uploadStage === "uploading" || state.uploadStage === "analyzing" || state.uploadStage === "previewing") {
          setUploadStatus("界面有局部渲染异常，但后台处理仍在继续。请关注终端日志，或稍后刷新查看结果。", "warn");
        }
      }
      schedulePaperLayouts();
    }

    async function refreshPreview() {
      if (!state.workbookId || !selectedTargets().length) {
        state.preview = null;
        if (state.workbookName && state.uploadStage !== "uploading" && state.uploadStage !== "analyzing") {
          state.uploadStage = "ready";
        }
        renderAll();
        return;
      }
      setTopStatus("正在生成分页预览...", false);
      const payload = await fetchJson("/api/preview-plan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          workbookId: state.workbookId,
          printTargets: selectedTargets(),
          plan: planPayload()
        })
      }, 90000);
      state.preview = payload.preview;
      if (["analyzing", "previewing", "preview-error"].includes(state.uploadStage)) {
        state.uploadStage = "ready";
      }
      renderAll();
      showToast("分页预览已同步");
    }

    async function exportResults() {
      if (!state.workbookId || !selectedTargets().length) {
        setDownloadStatus("请先上传 Excel，并至少选中一个需要打印的 Sheet。", "error");
        return;
      }
      setDownloadStatus("姝ｅ湪鐢熸垚瀵煎嚭鏂囦欢...");
      const payload = await fetchJson("/api/optimize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          workbookId: state.workbookId,
          printTargets: selectedTargets(),
          plan: planPayload()
        })
      }, 120000);
      state.downloads = (payload.downloads || []).map((item) => ({
        ...item,
        filename: item.filename || downloadFileName(item.url),
        url: item.url.startsWith("http") ? item.url : apiUrl(item.url)
      }));
      state.exportWarnings = payload.warnings || [];
      state.preview = payload.preview || state.preview;
      const statusType = state.exportWarnings.length ? "warn" : "ok";
      const downloadTypes = state.downloads.map((item) => item.label).join(", ");
      setDownloadStatus(
        state.exportWarnings.length
          ? `已生成 ${state.downloads.length} 个文件：${downloadTypes}。部分输出仍有提醒，请在下方查看。`
          : `已生成 ${state.downloads.length} 个文件：${downloadTypes}。`,
        statusType
      );
      renderAll();
      setStage("export");
      showToast("导出文件已就绪");
    }

    function explainNetworkError(error) {
      if (location.protocol === "file:") {
        return `${error.message}。请先用 python -m server.api 启动本地服务，再打开 http://127.0.0.1:4173/。`;
      }
      return `${error.message}。请确认本地 server.api 进程正在运行。`;
    }

    document.addEventListener("mouseup", () => {
      if (!state.dragging) return;
      state.dragging = false;
      state.dragOrigin = null;
      refreshPreview().catch((error) => setDownloadStatus(explainNetworkError(error), "error"));
    });

    document.addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      if (button.dataset.downloadUrl) {
        triggerDirectDownload(button.dataset.downloadUrl, button.dataset.downloadName || "");
        showToast("下载已开始");
        return;
      }

      if (button.id === "excelQuickPrint") {
        try {
          await runExcelQuickPrint();
        } catch (error) {
          setDownloadStatus(explainNetworkError(error), "error");
        }
        return;
      }

      if (button.id === "excelQuickInspect") {
        const count = selectPresetPrintAreaSheets();
        renderAll();
        setStage("sheets");
        try {
          await refreshPreview();
        } catch (error) {
          setDownloadStatus(explainNetworkError(error), "error");
        }
        showToast(count ? `已切换到 ${count} 个 Excel 原打印区域 Sheet` : "当前没有检测到 Excel 原打印区域");
        return;
      }

      if (button.dataset.stage) {
        setStage(button.dataset.stage);
        return;
      }

      if (button.dataset.sheetFocus) {
        state.activeSheetName = button.dataset.sheetFocus;
        state.batch.baseSheetName = button.dataset.sheetFocus;
        renderAll();
        return;
      }

      if (button.dataset.rangeSheet) {
        state.activeSheetName = button.dataset.rangeSheet;
        state.batch.baseSheetName = button.dataset.rangeSheet;
        renderAll();
        if (state.stage === "area") {
          loadSheetGrid(button.dataset.rangeSheet).catch((error) => setDownloadStatus(explainNetworkError(error), "error"));
        }
        return;
      }

      if (button.dataset.settingsSheet) {
        state.previewUi.settingsSheetName = button.dataset.settingsSheet;
        syncUiSettingsFromSheet(button.dataset.settingsSheet);
        renderAll();
        return;
      }

      if (button.dataset.previewPage && button.dataset.previewSheet && button.dataset.previewScope) {
        const scope = button.dataset.previewScope;
        const map = previewPageMap(scope);
        map[button.dataset.previewSheet] = Number(button.dataset.previewPage) || 1;
        renderAll();
        return;
      }

      if (button.dataset.planId) {
        const plan = state.plans.find((item) => item.id === button.dataset.planId);
        const targetSheetName = state.stage === "settings" ? settingsSheetName() : activeSheet()?.name;
        applyPlan(plan, targetSheetName);
        renderAll();
        try {
          await refreshPreview();
        } catch (error) {
          setDownloadStatus(explainNetworkError(error), "error");
        }
        return;
      }

      if (button.dataset.setting) {
        const key = button.dataset.setting;
        const value = button.dataset.value;
        syncUiSettingsFromSheet(settingsSheetName());
        state.settings[key] = value;
        if (key === "fitMode") {
          if (value === "singlePage") {
            state.settings.fitToWidth = 1;
            state.settings.fitToHeight = 1;
          } else if (value === "fitRows") {
            state.settings.fitToWidth = 0;
            state.settings.fitToHeight = 1;
          } else {
            state.settings.fitToWidth = 1;
            state.settings.fitToHeight = 0;
          }
        }
        commitUiSettingsToSheet(settingsSheetName());
        renderAll();
        try {
          await refreshPreview();
        } catch (error) {
          setDownloadStatus(explainNetworkError(error), "error");
        }
        return;
      }

      if (button.dataset.toggle) {
        const key = button.dataset.toggle;
        syncUiSettingsFromSheet(settingsSheetName());
        state.settings[key] = !state.settings[key];
        commitUiSettingsToSheet(settingsSheetName());
        renderAll();
        try {
          await refreshPreview();
        } catch (error) {
          setDownloadStatus(explainNetworkError(error), "error");
        }
      }
    });

    document.addEventListener("change", async (event) => {
      const input = event.target;
      if (input instanceof HTMLSelectElement) {
        if (input.id === "uploadPreviewSelect" || input.id === "rangeSheetSelect") {
          state.activeSheetName = input.value;
          state.batch.baseSheetName = input.value;
          renderAll();
          if (input.id === "rangeSheetSelect" && state.stage === "area") {
            loadSheetGrid(input.value).catch((error) => setDownloadStatus(explainNetworkError(error), "error"));
          }
          return;
        }
      }
      if (!(input instanceof HTMLInputElement)) return;
      if (!input.dataset.sheetCheck) return;
      const sheet = state.sheets.find((item) => item.name === input.dataset.sheetCheck);
      if (!sheet) return;
      sheet.checked = input.checked;
      if (!selectedSheets().some((item) => item.name === state.activeSheetName)) {
        state.activeSheetName = selectedSheets()[0]?.name || state.sheets[0]?.name || "";
      }
      renderAll();
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("fileInput").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      if (!/\.(xlsx|xlsm)$/i.test(file.name)) {
        setUploadStatus("请选择 `.xlsx` 或 `.xlsm` 文件。", "error");
        return;
      }

      try {
        await ensureBackendReady();
      } catch (error) {
        state.uploadStage = "error";
        setUploadStatus(`本地服务未就绪。${explainNetworkError(error)}`, "error");
        renderAll();
        return;
      }

      setUploadStatus("正在上传并解析 Excel...");
      setDownloadStatus("导出完成后，这里会显示下载入口。");
      state.downloads = [];
      state.exportWarnings = [];
      state.uploadStage = "uploading";
      state.pendingWorkbookName = file.name;
      renderAll();
      const form = new FormData();
      form.append("file", file);

      try {
        console.info("[Excelsuperpower UI] upload:start", file.name, file.size);
        const payload = await fetchJson("/api/upload", { method: "POST", body: form }, 120000);
        console.info("[Excelsuperpower UI] upload:done", payload.workbookId, payload.sheetCount || 0);
        const checkedNames = initialCheckedNames(payload.sheets || []);
        state.workbookId = payload.workbookId;
        state.workbookName = payload.filename || file.name;
        state.sheets = (payload.sheets || []).map((sheet) => ({
          ...sheet,
          checked: checkedNames.has(sheet.name)
        }));
        state.plans = payload.plans || [];
        state.activeSheetName = state.sheets[0]?.name || "";
        state.batch.baseSheetName = state.sheets[0]?.name || "";
        state.batch.lastAppliedCount = Math.max(0, checkedNames.size - 1);
        state.pendingWorkbookName = "";
        state.uploadStage = "analyzing";
        state.previewUi = { settingsSheetName: "", settingsPageBySheet: {}, areaPageBySheet: {}, uploadPageBySheet: {}, detailPageBySheet: {} };
        state.sheetSettingsByName = Object.fromEntries(state.sheets.map((sheet) => [
          sheet.name,
          cloneSettings({ ...(state.plans[0] || DEFAULT_PRINT_SETTINGS), id: state.plans[0]?.id || DEFAULT_PRINT_SETTINGS.id })
        ]));
        syncUiSettingsFromSheet(state.activeSheetName);
        state.preview = null;
        setUploadStatus(`${state.workbookName} 解析完成，共识别 ${payload.sheetCount || state.sheets.length} 个可见 Sheet。`, "ok");
        renderAll();
      } catch (error) {
        reportClientIssue("upload-request", error);
        state.uploadStage = "error";
        state.pendingWorkbookName = "";
        setUploadStatus(explainNetworkError(error), "error");
        renderAll();
        return;
      }

      try {
        state.uploadStage = "previewing";
        renderAll();
        await refreshPreview();
        renderAll();
        showToast("Excel 上传完成，首轮预览已就绪");
      } catch (error) {
        reportClientIssue("preview-request", error);
        state.uploadStage = "preview-error";
        setUploadStatus(`工作簿已解析成功，但首轮分页预览暂未完成。${explainNetworkError(error)}`, "warn");
        renderAll();
      }
    });

    $("previewRefresh").addEventListener("click", async () => {
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("matchAndSelect").addEventListener("click", async () => {
      try {
        await runBatchSelection();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("applyBatchRange").addEventListener("click", async () => {
      try {
        await runBatchRangeApply();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("applyBatchRangeInline").addEventListener("click", async () => {
      try {
        await runBatchRangeApply();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("wrapLongTextToggle").addEventListener("click", async () => {
      syncUiSettingsFromSheet(settingsSheetName());
      state.settings.wrapLongText = !state.settings.wrapLongText;
      if (!state.settings.wrapLongText) {
        state.settings.wrapTextColumns = "";
      }
      commitUiSettingsToSheet(settingsSheetName());
      renderAll();
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("applyWrapColumns").addEventListener("click", async () => {
      syncUiSettingsFromSheet(settingsSheetName());
      state.settings.wrapLongText = true;
      state.settings.wrapTextColumns = $("wrapColumnsInput").value.trim();
      commitUiSettingsToSheet(settingsSheetName());
      renderAll();
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("jumpExport").addEventListener("click", async () => {
      if (!hasExcelQuickPrint()) {
        setStage("export");
        return;
      }
      try {
        await runExcelQuickPrint();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });
    $("jumpArea").addEventListener("click", () => setStage("area"));
    $("sheetToArea").addEventListener("click", () => setStage("area"));
    $("jumpSettings").addEventListener("click", () => setStage("settings"));
    $("jumpAi").addEventListener("click", () => setStage("ai"));
    $("backToUpload").addEventListener("click", () => setStage("upload"));
    $("exportFromTop").addEventListener("click", () => $("exportButton").click());

    $("applyRange").addEventListener("click", async () => {
      const sheet = activeSheet();
      const bounds = parseRange($("manualRangeInput").value);
      if (!sheet || !bounds) {
        showToast("请输入合法的 A1 范围");
        return;
      }
      const auto = parseRange(sheet.autoRange);
      if (!auto || !intersects(bounds, auto)) {
        showToast("打印范围需要落在识别出的数据区域内");
        return;
      }
      updateSelectionFromBounds(bounds, false);
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("resetRange").addEventListener("click", async () => {
      const sheet = activeSheet();
      if (!sheet) return;
      sheet.printRange = sheet.nativePrintArea || sheet.autoRange;
      sheet.rangeSource = sheet.hasNativePrintArea ? "excel" : "auto";
      renderAll();
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("syncRangePreview").addEventListener("click", async () => {
      try {
        await refreshPreview();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    $("exportButton").addEventListener("click", async () => {
      try {
        await exportResults();
      } catch (error) {
        setDownloadStatus(explainNetworkError(error), "error");
      }
    });

    window.addEventListener("resize", () => schedulePaperLayouts());

    renderAll();
  </script>
</body>
</html>
